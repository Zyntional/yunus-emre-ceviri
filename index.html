<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yunus Emre Ortaokulu | Profesyonel Çeviri</title>
    
    <link rel="icon" type="image/png" href="logo.png">

    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px 0;
            box-sizing: border-box;
        }

        .container {
            background: white;
            width: 400px;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }

        /* --- LOGO STİLİ --- */
        .app-logo {
            width: 90px;
            height: 90px;
            object-fit: cover;
            border-radius: 50%;
            margin: 0 auto 15px;
            display: block;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }

        h1 { color: #1e293b; font-size: 22px; margin-bottom: 5px; }
        .subtitle { color: #64748b; font-size: 14px; margin-bottom: 20px; }

        textarea {
            width: 100%;
            height: 100px;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 16px;
            margin-bottom: 10px;
            resize: none;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        .btn:hover { background: #1d4ed8; }

        .result {
            margin-top: 20px;
            padding: 15px;
            background: #f1f5f9;
            border-radius: 10px;
            min-height: 50px;
            text-align: left;
            color: #1e293b;
            font-weight: 500;
            word-wrap: break-word;
        }

        /* --- İLETİŞİM FORMU ELEMANLARI --- */
        .input-field {
            width: 100%; 
            padding: 8px; 
            border: 1px solid #cbd5e1; 
            border-radius: 6px; 
            box-sizing: border-box; 
            font-size: 14px;
        }

        .form-btn {
            background: #64748b; 
            color: white; 
            border: none; 
            padding: 8px; 
            border-radius: 6px; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 14px; 
            transition: 0.3s;
        }
        .form-btn:hover { background: #475569; }

        footer {
            margin-top: 20px;
            font-size: 12px;
            color: #94a3b8;
            border-top: 1px solid #f1f5f9;
            padding-top: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <img src="logo.png" alt="Okul Logosu" class="app-logo">

    <h1>Yunus Emre Ortaokulu</h1>
    <p class="subtitle">Çeviri Uygulaması</p>

    <textarea id="textInput" placeholder="Buraya yazın..."></textarea>
    
    <select id="langPair" style="width:100%; margin-bottom:10px; padding:8px; border-radius:5px; border: 1px solid #cbd5e1;">
        <option value="tr|en">Türkçe -> İngilizce</option>
        <option value="en|tr">İngilizce -> Türkçe</option>
    </select>

    <button class="btn" onclick="translateNow()">Şimdi Çevir</button>

    <div class="result" id="resultText">Sonuç burada görünecek...</div>

    <div style="margin-top: 25px; border-top: 1px solid #f1f5f9; padding-top: 20px; text-align: left;">
        <h3 style="color: #1e293b; font-size: 16px; margin-bottom: 10px; text-align: center;">📬 Geri Bildirim / İletişim</h3>
        
        <form id="contactForm" style="display: flex; flex-direction: column; gap: 10px;">
            <input type="text" id="formName" placeholder="Adınız (İsteğe bağlı)" class="input-field">
            <input type="email" id="formEmail" placeholder="E-posta adresiniz" required class="input-field">
            <textarea id="formMessage" placeholder="Mesajınız veya hata bildirimi..." required class="input-field" style="height: 60px; resize: none;"></textarea>
            
            <button type="submit" class="form-btn" id="formSubmitBtn">Mesaj Gönder</button>
        </form>
        
        <div id="formStatus" style="margin-top: 10px; font-size: 13px; text-align: center; font-weight: bold; display: none;"></div>
    </div>

    <footer>
        Hazırlayan: <b>R.Can ARMAN - 8/B</b>
    </footer>
</div>

<script>
    // --- ÇEVİRİ FONKSİYONU ---
    async function translateNow() {
        const text = document.getElementById('textInput').value.trim();
        const lang = document.getElementById('langPair').value.split('|');
        const resDiv = document.getElementById('resultText');

        if(!text) {
            alert("Lütfen çevirmek istediğiniz metni yazın!");
            return;
        }
        
        resDiv.innerText = "Çevriliyor...";

        try {
            const response = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=${lang[0]}&tl=${lang[1]}&dt=t&q=${encodeURIComponent(text)}`);
            const data = await response.json();
            
            let translatedContent = "";
            if (data[0]) {
                data[0].forEach(item => {
                    if (item[0]) {
                        translatedContent += item[0];
                    }
                });
            }
            
            resDiv.innerText = translatedContent || "Çeviri bulunamadı.";
        } catch (error) {
            resDiv.innerText = "Hata! Lütfen internet bağlantınızı kontrol edin.";
            console.error(error);
        }
    }

    // --- SİTEDEN ÇIKMADAN ARKA PLANDA MAİL GÖNDERME FONKSİYONU ---
    document.getElementById('contactForm').addEventListener('submit', async function(e) {
        e.preventDefault(); // Sayfanın yenilenmesini ve dışarı taşınmasını engeller
        
        const btn = document.getElementById('formSubmitBtn');
        const status = document.getElementById('formStatus');
        
        const name = document.getElementById('formName').value;
        const email = document.getElementById('formEmail').value;
        const message = document.getElementById('formMessage').value;

        btn.disabled = true;
        btn.innerText = "Gönderiliyor...";
        status.style.display = "block";
        status.style.color = "#64748b";
        status.innerText = "Mesaj iletiliyor, lütfen bekleyin...";

        try {
            // FormSubmit'in AJAX apisini tetikliyoruz (Sayfa değişmez!)
            const response = await fetch("https://formsubmit.co/ajax/zyntional.dev@gmail.com", {
                method: "POST",
                headers: { 
                    "Content-Type": "application/json",
                    "Accept": "application/json"
                },
                body: JSON.stringify({
                    İsim: name,
                    Email: email,
                    Mesaj: message,
                    _captcha: "false"
                })
            });

            if(response.ok) {
                status.style.color = "#16a34a"; // Yeşil renk
                status.innerText = "🚀 Mesajınız başarıyla gönderildi!";
                document.getElementById('contactForm').reset(); // Kutuları temizler
            } else {
                status.style.color = "#dc2626"; // Kırmızı renk
                status.innerText = "Sunucu yoğun, lütfen az sonra tekrar deneyin.";
            }
        } catch (error) {
            status.style.color = "#dc2626";
            status.innerText = "Bağlantı hatası oluştu.";
        } finally {
            btn.disabled = false;
            btn.innerText = "Mesaj Gönder";
        }
    });
</script>

</body>
</html>
